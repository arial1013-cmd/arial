<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚兒の行事曆 🐠</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--p:#ff7eb3;--pl:#ffd6e8;--bg:#fff8f5;--sur:#fff;--text:#3d2c35;--mu:#9e8a93;--bd:#f0dce6;--r:18px;}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:1080px;margin:0 auto;padding:16px 12px;}
#bar{position:fixed;top:0;left:0;right:0;height:3px;display:none;z-index:999;
  background:linear-gradient(90deg,var(--p),#7ec8e3,var(--p));background-size:200%;animation:sl 1.2s linear infinite;}
#bar.on{display:block;}@keyframes sl{to{background-position:200%}}
.hd{text-align:center;margin-bottom:14px;}
.hd h1{font-family:"Nunito",sans-serif;font-size:1.8rem;font-weight:900;color:var(--p);}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:var(--mu);
  padding:3px 10px;border-radius:20px;background:var(--sur);border:1px solid var(--bd);margin-top:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.sdot.ok{background:#6ee7b7;}.sdot.spin{background:#fbbf24;animation:pu .8s ease infinite alternate;}.sdot.err{background:#ff6b6b;}
@keyframes pu{from{opacity:1}to{opacity:.3}}
.nav{display:flex;align-items:center;justify-content:space-between;background:var(--sur);
  border-radius:var(--r);padding:10px 16px;margin-bottom:10px;
  box-shadow:0 4px 20px rgba(255,126,179,.12);border:1.5px solid var(--bd);}
.nav-l{display:flex;align-items:center;gap:8px;}
.ntitle{font-family:"Nunito",sans-serif;font-size:1.1rem;font-weight:900;}
.nb{background:var(--pl);border:none;color:var(--p);width:32px;height:32px;border-radius:50%;
  font-size:1rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nb:hover{background:var(--p);color:#fff;}
.tb{background:var(--p);color:#fff;border:none;border-radius:20px;padding:5px 13px;font-size:.78rem;font-weight:700;cursor:pointer;}
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;
  padding:8px 14px;background:var(--sur);border-radius:12px;border:1.5px solid var(--bd);}
.li{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;color:var(--mu);}
.ld{width:9px;height:9px;border-radius:50%;}
.sep{width:1px;height:14px;background:var(--bd);margin:0 4px;}
.hbtn{margin-left:auto;background:none;border:1px solid var(--bd);border-radius:8px;
  padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--mu);cursor:pointer;}
.hbtn:hover{border-color:var(--p);color:var(--p);}
.twrap{background:var(--sur);border-radius:var(--r);overflow:hidden;overflow-x:auto;
  box-shadow:0 4px 20px rgba(255,126,179,.12);border:1.5px solid var(--bd);}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:580px;}
th,td{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);}
th:last-child,td:last-child{border-right:none;}
.corner{width:60px;min-width:60px;background:#fdf5f8;border-bottom:2px solid var(--bd)!important;border-right:2px solid var(--bd)!important;}
.dhead{padding:7px 4px;text-align:center;cursor:pointer;border-bottom:2px solid var(--bd)!important;transition:background .15s;}
.dhead:hover{filter:brightness(.96);}
.dn{font-family:"Nunito",sans-serif;font-size:.68rem;font-weight:800;color:var(--mu);}
.dd{font-family:"Nunito",sans-serif;font-size:1.2rem;font-weight:900;line-height:1;}
.hol{font-size:.52rem;color:#ff6b6b;font-weight:700;margin-top:1px;}
.adlbl{background:#fdf5f8;font-size:.55rem;font-weight:700;color:var(--mu);text-align:center;
  padding:3px 2px;vertical-align:middle;border-right:2px solid var(--bd)!important;border-bottom:2px solid var(--bd)!important;}
.adcell{padding:2px 3px;vertical-align:top;cursor:pointer;border-bottom:2px solid var(--bd)!important;transition:background .12s;}
.adcell:hover{background:var(--pl);}
.adchip{display:block;font-size:.6rem;border-radius:4px;padding:1px 5px;color:#fff;font-weight:700;
  margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.plbl{background:#fdf5f8;vertical-align:top;padding:5px 6px 4px 4px;
  text-align:right;border-right:2px solid var(--bd)!important;white-space:nowrap;}
.pn{font-family:"Nunito",sans-serif;font-size:.62rem;font-weight:800;color:var(--p);}
.pt{font-family:"Nunito",sans-serif;font-size:.52rem;color:var(--mu);}
.pcell{height:60px;vertical-align:top;padding:0;position:relative;cursor:pointer;transition:background .12s;}
.pcell:hover{background:rgba(255,126,179,.08);}
.pcell.wknd{background:rgba(0,0,0,.025);}
.pcell.wknd:hover{background:rgba(0,0,0,.04);}
.cbg{position:absolute;inset:2px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:.63rem;font-weight:800;text-align:center;line-height:1.3;pointer-events:none;}
.evb{position:absolute;inset:2px;border-radius:6px;padding:3px 6px;color:#fff;font-size:.62rem;
  font-weight:700;cursor:pointer;z-index:3;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.18);}
.evb:hover{filter:brightness(.88);}
.evt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evt2{font-size:.54rem;opacity:.85;}
.ov{display:none;position:fixed;inset:0;background:rgba(61,44,53,.38);backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
.modal{background:var(--sur);border-radius:var(--r);padding:24px;width:100%;max-width:400px;
  border:2px solid var(--bd);box-shadow:0 20px 60px rgba(61,44,53,.22);animation:pop .22s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-family:"Nunito",sans-serif;font-size:1.05rem;font-weight:900;color:var(--p);margin-bottom:12px;}
.modal label{display:block;font-size:.73rem;font-weight:700;color:var(--mu);margin-top:10px;margin-bottom:4px;text-transform:uppercase;}
.modal input[type=text],.modal input[type=time]{width:100%;padding:9px 12px;border:1.5px solid var(--bd);
  border-radius:10px;font-size:.88rem;font-family:"Noto Sans TC",sans-serif;color:var(--text);background:#fafafa;outline:none;}
.modal input:focus{border-color:var(--p);background:#fff;}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:4px;}
.cbtn{border:2px solid transparent;border-radius:8px;padding:5px 2px;font-size:.66rem;
  font-weight:700;cursor:pointer;color:#fff;text-align:center;transition:all .2s;}
.cbtn.sel{border-color:#3d2c35;transform:scale(1.08);}
.mact{display:flex;gap:7px;margin-top:16px;}
.bsave{flex:1;background:linear-gradient(135deg,var(--p),#ff9dd0);color:#fff;border:none;
  border-radius:10px;padding:10px;font-size:.88rem;font-weight:800;font-family:"Nunito",sans-serif;cursor:pointer;}
.bsave:disabled{opacity:.5;cursor:not-allowed;}
.bcancel{background:var(--bg);color:var(--mu);border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:.83rem;font-weight:700;cursor:pointer;}
.bdel{background:#fff0f4;color:#ff4d6d;border:1.5px solid #ffb3c6;border-radius:10px;padding:10px 13px;font-size:.83rem;font-weight:700;cursor:pointer;}
.bdel:hover{background:#ff4d6d;color:#fff;}
.hov{display:none;position:fixed;inset:0;background:rgba(61,44,53,.38);backdrop-filter:blur(4px);
  z-index:300;align-items:center;justify-content:center;padding:16px;}
.hov.open{display:flex;}
.hrb{flex:1;padding:8px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.83rem;transition:all .2s;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--pl);border-radius:3px;}
/* ── MOBILE DAY VIEW ── */
@media(max-width:700px){
  .twrap{display:none;}
  #dayView{display:block;}
  .app{padding:12px 8px;}
  .hd h1{font-size:1.4rem;}
  .legend{display:none;}
}
@media(min-width:701px){
  #dayView{display:none;}
}
#dayView{display:none;background:var(--sur);border-radius:var(--r);
  box-shadow:0 4px 20px rgba(255,126,179,.12);border:1.5px solid var(--bd);overflow:hidden;}
.dv-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:2px solid var(--bd);background:#fdf5f8;}
.dv-title{font-family:"Nunito",sans-serif;font-weight:900;font-size:1.1rem;color:var(--p);text-align:center;flex:1;}
.dv-sub{font-size:.7rem;color:var(--mu);font-weight:600;margin-top:2px;}
.dv-hol{font-size:.65rem;color:#ff6b6b;font-weight:700;margin-top:2px;}
.dv-body{padding:0;}
.dv-row{display:flex;border-bottom:1px solid var(--bd);min-height:56px;}
.dv-row.allday{border-bottom:2px solid var(--bd);}
.dv-plbl{width:60px;min-width:60px;background:#fdf5f8;border-right:2px solid var(--bd);
  padding:6px 6px 4px 4px;text-align:right;display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-start;}
.dv-pn{font-family:"Nunito",sans-serif;font-size:.65rem;font-weight:800;color:var(--p);}
.dv-pt{font-family:"Nunito",sans-serif;font-size:.52rem;color:var(--mu);}
.dv-pcell{flex:1;position:relative;cursor:pointer;min-height:56px;transition:background .12s;}
.dv-pcell:hover{background:rgba(255,126,179,.08);}
.dv-course{position:absolute;inset:2px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.75rem;font-weight:800;text-align:center;
  line-height:1.3;pointer-events:none;}
.dv-evb{margin:3px 4px;border-radius:8px;padding:5px 10px;color:#fff;
  font-size:.75rem;font-weight:700;cursor:pointer;display:block;}
.dv-evb:hover{filter:brightness(.88);}
.dv-adchip{margin:2px 4px;border-radius:6px;padding:4px 10px;color:#fff;
  font-size:.75rem;font-weight:700;cursor:pointer;display:block;}
.dv-add{display:flex;align-items:center;justify-content:center;
  color:rgba(255,126,179,.4);font-size:1.2rem;height:100%;min-height:52px;}

</style>
</head>
<body>
<div id="bar"></div>
<div class="app">
<div class="hd">
  <h1>🐠 魚兒の行事曆</h1>
  <div class="sync"><div class="sdot spin" id="sdot"></div><span id="stxt">連線中…</span></div>
</div>
<div class="nav">
  <div class="nav-l">
    <button class="nb" id="prevBtn">‹</button>
    <button class="nb" id="nextBtn">›</button>
    <span class="ntitle" id="navTitle"></span>
    <button class="tb" id="todayBtn">今天</button>
  </div>
</div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>個人</div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>工作</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>學校</div>
  <div class="li"><div class="ld" style="background:#6ee7b7"></div>健康</div>
  <div class="li"><div class="ld" style="background:#fbbf24"></div>其他</div>
  <div class="li"><div class="ld" style="background:#ff6b6b"></div>節日</div>
  <div class="sep"></div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>高一英</div>
  <div class="li"><div class="ld" style="background:#4fc3f7"></div>高二123英</div>
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>高二2+3國</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>間接服務</div>
  <button class="hbtn" onclick="openHol()">＋ 自訂節日</button>
</div>
<div class="twrap"><table id="wt"></table></div>

<!-- Mobile Day View -->
<div id="dayView">
  <div class="dv-head">
    <div style="flex:1;text-align:center;">
      <div class="dv-title" id="dvTitle"></div>
      <div class="dv-sub" id="dvSub"></div>
      <div class="dv-hol" id="dvHol"></div>
    </div>
  </div>
  <div class="dv-body" id="dvBody"></div>
</div>

</div>

<!-- Event Modal -->
<div class="ov" id="evOv">
  <div class="modal">
    <h2 id="evH">🌸 新增事件</h2>
    <div id="evDlbl" style="font-size:.75rem;color:var(--mu);font-weight:600;margin-bottom:2px;"></div>
    <label>事件名稱</label>
    <input type="text" id="evN" placeholder="輸入事件名稱…" maxlength="40">
    <label>開始時間（留空=全天）</label>
    <input type="time" id="evS">
    <label>結束時間</label>
    <input type="time" id="evE">
    <label>類別</label>
    <div class="cgrid">
      <button class="cbtn sel" style="background:#ff7eb3" data-cat="personal">個人</button>
      <button class="cbtn" style="background:#7eb8ff" data-cat="work">工作</button>
      <button class="cbtn" style="background:#a78bfa" data-cat="school">學校</button>
      <button class="cbtn" style="background:#6ee7b7" data-cat="health">健康</button>
      <button class="cbtn" style="background:#fbbf24" data-cat="other">其他</button>
    </div>
    <div class="mact">
      <button class="bcancel" id="evCan">取消</button>
      <button class="bdel" id="evDel" style="display:none">刪除</button>
      <button class="bsave" id="evSav">💾 儲存</button>
    </div>
  </div>
</div>

<!-- Holiday Modal -->
<div class="hov" id="holOv">
  <div class="modal">
    <h2>🎉 自訂節日</h2>
    <label>節日名稱</label>
    <input type="text" id="holN" placeholder="例：媽媽生日" maxlength="20">
    <label>日期（YYYY-MM-DD）</label>
    <input type="text" id="holD" placeholder="2026-05-10">
    <label>重複方式</label>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="hrb" id="hrY" onclick="setHR(true)" style="border:2px solid var(--p);background:var(--p);color:#fff;">每年重複</button>
      <button class="hrb" id="hrN" onclick="setHR(false)" style="border:2px solid var(--bd);background:#fafafa;color:var(--mu);">僅這年</button>
    </div>
    <div class="mact">
      <button class="bcancel" onclick="closeHol()">取消</button>
      <button class="bsave" onclick="saveHol()">新增</button>
    </div>
    <div id="holList" style="margin-top:12px;"></div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbx5aF0H4G0GnxCXEetAC8wUsVRUTUGSEJjCvfu4CzG952MEJq8pdQteXKCZMS0fEie0kw/exec';

const CAT={
  personal:{label:'個人',color:'#ff7eb3'},
  work:    {label:'工作',color:'#7eb8ff'},
  school:  {label:'學校',color:'#a78bfa'},
  health:  {label:'健康',color:'#6ee7b7'},
  other:   {label:'其他',color:'#fbbf24'},
};
const MBG=['#fff0f6','#fff4e6','#f0fff4','#f0f9ff','#fdf4ff','#fff9e6','#fff3e0','#e8f5e9','#e3f2fd','#fbe9e7','#f3e5f5','#e0f7fa'];
const WD=['日','一','二','三','四','五','六'];

// Periods
const PERIODS=[
  {n:'第1節',s:'08:00',e:'08:50'},
  {n:'第2節',s:'09:00',e:'09:50'},
  {n:'第3節',s:'10:00',e:'10:50'},
  {n:'第4節',s:'11:00',e:'11:50'},
  {n:'午休',  s:'11:50',e:'12:55'},
  {n:'第5節',s:'12:55',e:'13:45'},
  {n:'第6節',s:'13:55',e:'14:45'},
  {n:'第7節',s:'15:00',e:'15:50'},
  {n:'第8節',s:'16:00',e:'16:50'},
  {n:'備註',  s:'',e:''},
];

// Timetable (period index based on PERIODS above)
// 0=第1,1=第2,2=第3,3=第4,4=午休,5=第5,6=第6,7=第7,8=第8,9=備註
const SC={'高一2345英文':'#7eb8ff','高二123英文':'#4fc3f7','高二2+3國文':'#ff7eb3','間接服務':'#a78bfa'};
const TT={
  1:{1:'間接服務',2:'高一2345英文',3:'高二2+3國文',7:'高二123英文'},
  2:{0:'高一2345英文',1:'高二2+3國文',3:'高二123英文',5:'間接服務',6:'間接服務',7:'間接服務'},
  3:{0:'高二123英文',2:'高一2345英文'},
  4:{1:'高二2+3國文',2:'高一2345英文'},
  5:{0:'高二2+3國文',6:'高二123英文',7:'間接服務'},
};
const SS='2026-02-23', SE='2026-06-30';

// Holidays
const FH={'01-01':'元旦','02-28':'和平紀念日','04-04':'兒童節','04-05':'清明節','10-10':'國慶日','12-25':'聖誕節'};
const SH={'2026-02-17':'春節','2026-02-18':'春節','2026-02-19':'春節','2026-02-20':'春節',
  '2026-02-21':'春節','2026-02-22':'春節','2026-03-03':'元宵節','2026-06-19':'端午節',
  '2026-09-25':'中秋節','2026-12-22':'冬至','2025-01-29':'春節','2025-05-31':'端午節','2025-10-06':'中秋節'};
let customHols=JSON.parse(localStorage.getItem('yh')||'[]');
function getHols(ds){
  const r=[];
  if(FH[ds.slice(5)])r.push(FH[ds.slice(5)]);
  if(SH[ds])r.push(SH[ds]);
  customHols.forEach(h=>{
    if(h.r&&h.d.slice(5)===ds.slice(5))r.push(h.n);
    else if(!h.r&&h.d===ds)r.push(h.n);
  });
  return[...new Set(r)];
}

// State
const $=id=>document.getElementById(id);
let events={},cur=new Date(),selCat='personal',editing=null,pendingDk='',holRepeat=true;

function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayKey(){return dkey(cur);}
function fmtDk(ds){const[y,m,d]=ds.split('-');return `${y}年${+m}月${+d}日`;}
function weekMon(d){const r=new Date(d);r.setHours(0,0,0,0);const w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
let wkStart=weekMon(cur);

function setSyncing(st,tx){$('sdot').className='sdot '+st;$('stxt').textContent=tx;}
function setLoad(on){$('bar').classList.toggle('on',on);}

async function fetchEvents(){
  setSyncing('spin','同步中…');setLoad(true);
  try{
    const res=await fetch(API+'?t='+Date.now());
    const rows=await res.json();
    events={};
    rows.forEach(r=>{
      if(!r.date)return;
      const ds=String(r.date).trim();
      if(!ds.match(/^\d{4}-\d{2}-\d{2}$/))return;
      if(!events[ds])events[ds]=[];
      events[ds].push({title:String(r.title||''),cat:r.cat||'other',
        ts:String(r.timeStart||'').trim().slice(0,5),
        te:String(r.timeEnd||'').trim().slice(0,5)});
    });
    Object.keys(events).forEach(k=>events[k].sort((a,b)=>(a.ts||'99:99').localeCompare(b.ts||'99:99')));
    setSyncing('ok','已同步');
  }catch(e){setSyncing('err','連線失敗');}
  setLoad(false);
  renderView();
}

async function apiPost(p){
  await fetch(API,{method:'POST',body:JSON.stringify(p)});
}

function renderWeek(){
  const days=[];
  for(let i=0;i<7;i++)days.push(addDays(wkStart,i));
  const s=days[0],e=days[6];
  $('navTitle').textContent=`${s.getFullYear()} 年 ${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`;
  const mbg=MBG[wkStart.getMonth()];
  const tbl=$('wt');
  tbl.innerHTML='';

  // thead
  const thead=tbl.createTHead();
  const hr=thead.insertRow();
  const co=document.createElement('th');co.className='corner';hr.appendChild(co);
  days.forEach((d,i)=>{
    const dk=dkey(d),wd=d.getDay(),isToday=dk===todayKey(),isW=(wd===0||wd===6);
    const hols=getHols(dk);
    const th=document.createElement('th');th.className='dhead';
    const dnC=wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#9e8a93';
    const ddC=isToday?'var(--p)':wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#3d2c35';
    th.style.background=isToday?'linear-gradient(135deg,#fff0f6,#ffd6e8)':isW?'rgba(0,0,0,.03)':mbg;
    th.innerHTML=`<div class="dn" style="color:${dnC}">${WD[wd]}</div>`
      +`<div class="dd" style="color:${ddC}">${d.getDate()}</div>`
      +(hols.length?`<div class="hol">${hols[0]}</div>`:'');
    th.onclick=()=>openEv(dk,'','');
    hr.appendChild(th);
  });

  // tbody
  const tbody=tbl.createTBody();

  // all-day row
  const adr=tbody.insertRow();
  const al=document.createElement('td');al.className='adlbl';al.textContent='全天';adr.appendChild(al);
  days.forEach(d=>{
    const dk=dkey(d);
    const td=adr.insertCell();td.className='adcell';
    td.onclick=()=>openEv(dk,'','');
    (events[dk]||[]).filter(ev=>(!ev.ts||ev.ts==='')&&ev.ts!=='23:59').forEach((ev,idx)=>{
      const c=document.createElement('div');c.className='adchip';
      c.style.background=CAT[ev.cat]?.color||'#aaa';c.textContent=ev.title;
      c.onclick=e=>{e.stopPropagation();openEv(dk,'','',idx);};
      td.appendChild(c);
    });
  });

  // period rows
  PERIODS.forEach((p,pi)=>{
    const isNote=p.n==='備註';
    const row=tbody.insertRow();
    const lbl=document.createElement('td');lbl.className='plbl';
    lbl.innerHTML=`<div class="pn">${p.n}</div>${p.s?`<div class="pt">${p.s}</div>`:''}`;
    row.appendChild(lbl);

    days.forEach((d,ci)=>{
      const dk=dkey(d),wd=d.getDay(),isW=(wd===0||wd===6);
      const inS=dk>=SS&&dk<=SE;
      const subj=(!isW&&inS&&TT[wd])?TT[wd][pi]:null;
      const td=row.insertCell();
      td.className='pcell'+(isW?' wknd':'');
      td.style.background=isW?'rgba(0,0,0,.025)':MBG[d.getMonth()];

      if(subj){
        const color=SC[subj]||'#aaa';
        td.style.background=`linear-gradient(135deg,${color}28,${color}14)`;
        const cb=document.createElement('div');cb.className='cbg';
        cb.style.color=color;cb.textContent=subj;td.appendChild(cb);
      }

      // click to add event (all cells including weekend and note)
      td.onclick=e=>{
        if(e.target===td||e.target.classList.contains('cbg'))
          openEv(dk,isNote?'23:59':p.s,isNote?'23:59':p.e);
      };

      // user events
      if(isNote){
        // 備註格只顯示 ts='23:59' 的事件
        (events[dk]||[]).filter(ev=>ev.ts==='23:59').forEach((ev,idx)=>{
          const eb=document.createElement('div');eb.className='evb';
          eb.style.cssText='position:absolute;inset:2px;border-radius:6px;padding:3px 6px;color:#fff;font-size:.62rem;font-weight:700;cursor:pointer;z-index:3;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.18);background:'+(CAT[ev.cat]?.color||'#aaa')+';';
          eb.innerHTML='<div class="evt">'+ev.title+'</div>';
          eb.onclick=e=>{e.stopPropagation();openEv(dk,'23:59','23:59',idx);};
          td.appendChild(eb);
        });
      } else {
        (events[dk]||[]).filter(ev=>ev.ts&&ev.ts!=='23:59').forEach((ev,idx)=>{
          const[ph,pm]=p.s.split(':').map(Number);
          const[eh,em]=ev.ts.split(':').map(Number);
          if(Math.abs((eh*60+em)-(ph*60+pm))>30)return;
          const eb=document.createElement('div');eb.className='evb';
          eb.style.background=CAT[ev.cat]?.color||'#aaa';
          eb.innerHTML=`<div class="evt">${ev.title}</div><div class="evt2">${ev.ts}${ev.te?'–'+ev.te:''}</div>`;
          eb.onclick=e=>{e.stopPropagation();openEv(dk,'','',idx);};
          td.appendChild(eb);
        });
      }
    });
  });
}

// Nav
$('prevBtn').onclick=()=>{wkStart=addDays(wkStart,-7);renderWeek();};
$('nextBtn').onclick=()=>{wkStart=addDays(wkStart,7);renderWeek();};
$('todayBtn').onclick=()=>{wkStart=weekMon(cur);renderWeek();};

// Event modal
function openEv(dk,defS,defE,idx=null){
  pendingDk=dk;editing=idx!==null?{dk,idx}:null;
  const isEdit=editing!==null;
  $('evH').textContent=isEdit?'✏️ 編輯事件':'🌸 新增事件';
  $('evDlbl').textContent='📅 '+fmtDk(dk);
  $('evDel').style.display=isEdit?'block':'none';
  if(isEdit){
    const ev=events[dk][idx];
    $('evN').value=ev.title;$('evS').value=ev.ts||'';$('evE').value=ev.te||'';selCat=ev.cat||'personal';
  }else{
    $('evN').value='';$('evS').value=defS;$('evE').value=defE;selCat='personal';
  }
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.cat===selCat));
  $('evOv').classList.add('open');
  setTimeout(()=>$('evN').focus(),80);
}
document.querySelectorAll('.cbtn').forEach(b=>b.onclick=()=>{
  selCat=b.dataset.cat;
  document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel');
});
$('evSav').onclick=async()=>{
  const title=$('evN').value.trim();
  if(!title){$('evN').focus();return;}
  $('evSav').disabled=true;$('evSav').textContent='儲存中…';
  $('evOv').classList.remove('open');
  setSyncing('spin','儲存中…');setLoad(true);
  if(editing){
    const old=events[editing.dk][editing.idx];
    await apiPost({action:'delete',date:editing.dk,title:old.title,cat:old.cat});
    await apiPost({action:'add',date:editing.dk,title,cat:selCat,timeStart:$('evS').value,timeEnd:$('evE').value});
  }else{
    await apiPost({action:'add',date:pendingDk,title,cat:selCat,timeStart:$('evS').value,timeEnd:$('evE').value});
  }
  await fetchEvents();
  $('evSav').disabled=false;$('evSav').textContent='💾 儲存';
};
$('evDel').onclick=async()=>{
  if(!editing||!confirm('確定刪除？'))return;
  $('evOv').classList.remove('open');
  setSyncing('spin','刪除中…');setLoad(true);
  const ev=events[editing.dk][editing.idx];
  await apiPost({action:'delete',date:editing.dk,title:ev.title,cat:ev.cat});
  await fetchEvents();
};
$('evCan').onclick=()=>$('evOv').classList.remove('open');
$('evOv').onclick=e=>{if(e.target===$('evOv'))$('evOv').classList.remove('open');};
$('evN').onkeydown=e=>{if(e.key==='Enter')$('evSav').click();if(e.key==='Escape')$('evCan').click();};

// Holiday modal
function openHol(){renderHolList();$('holOv').classList.add('open');}
function closeHol(){$('holOv').classList.remove('open');}
$('holOv').onclick=e=>{if(e.target===$('holOv'))closeHol();};
function setHR(v){
  holRepeat=v;
  $('hrY').style.cssText=`border:2px solid ${v?'var(--p)':'var(--bd)'};background:${v?'var(--p)':'#fafafa'};color:${v?'#fff':'var(--mu)'};`;
  $('hrN').style.cssText=`border:2px solid ${!v?'var(--p)':'var(--bd)'};background:${!v?'var(--p)':'#fafafa'};color:${!v?'#fff':'var(--mu)'};`;
}
function saveHol(){
  const n=$('holN').value.trim(),d=$('holD').value.trim();
  if(!n||!d.match(/^\d{4}-\d{2}-\d{2}$/)){alert('請填寫名稱和日期（YYYY-MM-DD）');return;}
  customHols.push({n,d,r:holRepeat});
  localStorage.setItem('yh',JSON.stringify(customHols));
  $('holN').value='';$('holD').value='';
  renderHolList();renderWeek();
}
function renderHolList(){
  const el=$('holList');
  if(!customHols.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-size:.7rem;font-weight:700;color:var(--mu);margin-bottom:6px;">已新增</div>';
  customHols.forEach((h,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:.78rem;';
    row.innerHTML=`<span style="flex:1;font-weight:600;">${h.n}</span><span style="color:var(--mu);">${h.d}${h.r?' (每年)':''}</span>`;
    const db=document.createElement('button');
    db.textContent='✕';db.style.cssText='background:none;border:none;color:#ffb3c6;cursor:pointer;font-size:.88rem;padding:2px 5px;';
    db.onclick=()=>{customHols.splice(i,1);localStorage.setItem('yh',JSON.stringify(customHols));renderHolList();renderWeek();};
    row.appendChild(db);el.appendChild(row);
  });
}


// ── MOBILE DAY VIEW ──
const isMobile=()=>window.innerWidth<=700;
let dayViewDate=new Date();

function renderDay(d){
  dayViewDate=new Date(d);
  const dk=dkey(d);
  const wd=d.getDay();
  const WDN=['日','一','二','三','四','五','六'];
  const hols=getHols(dk);
  $('dvTitle').textContent=`${d.getMonth()+1} 月 ${d.getDate()} 日（週${WDN[wd]}）`;
  $('dvSub').textContent=`${d.getFullYear()}`;
  $('dvHol').textContent=hols.length?'🎉 '+hols.join('・'):'';

  const body=$('dvBody');
  body.innerHTML='';

  // All-day row
  const allevs=(events[dk]||[]).filter(ev=>!ev.ts||ev.ts==='');
  if(allevs.length>0){
    const row=document.createElement('div');
    row.className='dv-row allday';
    const lbl=document.createElement('div');lbl.className='dv-plbl';
    lbl.innerHTML='<div class="dv-pn">全天</div>';
    row.appendChild(lbl);
    const cell=document.createElement('div');cell.className='dv-pcell';
    cell.style.padding='4px 0';
    cell.onclick=()=>openEv(dk,'','');
    allevs.forEach((ev,idx)=>{
      const c=document.createElement('div');c.className='dv-adchip';
      c.style.background=CAT[ev.cat]?.color||'#aaa';c.textContent=ev.title;
      c.onclick=e=>{e.stopPropagation();openEv(dk,'','',events[dk].indexOf(ev));};
      cell.appendChild(c);
    });
    row.appendChild(cell);body.appendChild(row);
  }

  // Period rows
  const isW=(wd===0||wd===6);
  const inS=dk>=SS&&dk<=SE;

  PERIODS.forEach((p,pi)=>{
    const isNote=p.n==='備註';
    const subj=(!isW&&inS&&TT[wd])?TT[wd][pi]:null;
    const row=document.createElement('div');row.className='dv-row';

    const lbl=document.createElement('div');lbl.className='dv-plbl';
    lbl.innerHTML=`<div class="dv-pn">${p.n}</div>${p.s&&!isNote?`<div class="dv-pt">${p.s}</div>`:''}`;
    row.appendChild(lbl);

    const cell=document.createElement('div');cell.className='dv-pcell';
    if(isW) cell.style.background='rgba(0,0,0,.025)';
    else cell.style.background=MBG[d.getMonth()];

    if(subj){
      const color=SC[subj]||'#aaa';
      cell.style.background=`linear-gradient(135deg,${color}28,${color}14)`;
      const cb=document.createElement('div');cb.className='dv-course';
      cb.style.color=color;cb.textContent=subj;cell.appendChild(cb);
    }

    cell.onclick=e=>{
      if(e.target===cell||e.target.classList.contains('dv-course'))
        openEv(dk,isNote?'23:59':p.s,isNote?'23:59':p.e);
    };

    // Events
    const rowEvs=isNote
      ?(events[dk]||[]).filter(ev=>ev.ts==='23:59')
      :(events[dk]||[]).filter(ev=>ev.ts&&ev.ts!=='23:59'&&(()=>{
          if(!p.s)return false;
          const[ph,pm]=p.s.split(':').map(Number);
          const[eh,em]=ev.ts.split(':').map(Number);
          return Math.abs((eh*60+em)-(ph*60+pm))<=30;
        })());

    rowEvs.forEach((ev,i)=>{
      const eb=document.createElement('div');eb.className='dv-evb';
      eb.style.background=CAT[ev.cat]?.color||'#aaa';
      eb.innerHTML=ev.title+(ev.ts&&ev.ts!=='23:59'?`<div style="font-size:.62rem;opacity:.85;">${ev.ts}${ev.te?'–'+ev.te:''}</div>`:'');
      eb.onclick=e=>{e.stopPropagation();openEv(dk,'','',events[dk].indexOf(ev));};
      cell.appendChild(eb);
    });

    if(!rowEvs.length&&!subj&&!isW){
      const ph=document.createElement('div');ph.className='dv-add';ph.textContent='+';
      cell.appendChild(ph);
    }

    row.appendChild(cell);body.appendChild(row);
  });
}

// Swipe support
let touchStartX=0;
document.getElementById('dayView').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.getElementById('dayView').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50){
    dayViewDate=addDays(dayViewDate,dx>0?-1:1);
    renderDay(dayViewDate);
  }
},{passive:true});

// Update nav title for mobile
function updateNavMobile(){
  if(isMobile()){
    // nav prev/next control day
    $('prevBtn').onclick=()=>{dayViewDate=addDays(dayViewDate,-1);renderDay(dayViewDate);};
    $('nextBtn').onclick=()=>{dayViewDate=addDays(dayViewDate,1);renderDay(dayViewDate);};
    $('todayBtn').onclick=()=>{dayViewDate=new Date(cur);renderDay(dayViewDate);};
  } else {
    $('prevBtn').onclick=()=>{wkStart=addDays(wkStart,-7);renderWeek();};
    $('nextBtn').onclick=()=>{wkStart=addDays(wkStart,7);renderWeek();};
    $('todayBtn').onclick=()=>{wkStart=weekMon(cur);renderWeek();};
  }
}

function renderView(){
  if(isMobile()){
    renderDay(dayViewDate);
    // update nav title
    const d=dayViewDate;
    $('navTitle').textContent=`${d.getFullYear()} 年 ${d.getMonth()+1}/${d.getDate()}`;
  } else {
    renderWeek();
  }
}

window.addEventListener('resize',()=>{
  updateNavMobile();
  renderView();
});

// Init
updateNavMobile();
renderView();
fetchEvents();
</script>
