<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚兒の行事曆 🐠</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#ff7eb3;--primary-light:#ffd6e8;--bg:#fff8f5;--surface:#fff;
  --text:#3d2c35;--muted:#9e8a93;--border:#f0dce6;--radius:18px;
  --shadow:0 4px 20px rgba(255,126,179,.12);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:1080px;margin:0 auto;padding:16px 12px;}

/* loading */
#bar{position:fixed;top:0;left:0;right:0;height:3px;display:none;z-index:999;
  background:linear-gradient(90deg,var(--primary),#7ec8e3,var(--primary));
  background-size:200%;animation:slide 1.2s linear infinite;}
#bar.on{display:block;}
@keyframes slide{to{background-position:200%}}

/* header */
.hd{text-align:center;margin-bottom:14px;}
.hd h1{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:900;color:var(--primary);}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;
  color:var(--muted);padding:3px 10px;border-radius:20px;background:var(--surface);
  border:1px solid var(--border);margin-top:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.sdot.ok{background:#6ee7b7;}.sdot.spin{background:#fbbf24;animation:pu .8s ease infinite alternate;}
.sdot.err{background:#ff6b6b;}
@keyframes pu{from{opacity:1}to{opacity:.3}}

/* nav */
.nav{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-radius:var(--radius);padding:10px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.nav-l{display:flex;align-items:center;gap:8px;}
.nav-title{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;}
.nb{background:var(--primary-light);border:none;color:var(--primary);width:32px;height:32px;
  border-radius:50%;font-size:1rem;cursor:pointer;font-weight:900;transition:all .2s;
  display:flex;align-items:center;justify-content:center;}
.nb:hover{background:var(--primary);color:#fff;}
.tb{background:var(--primary);color:#fff;border:none;border-radius:20px;
  padding:5px 13px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.tb:hover{opacity:.88;}

/* legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;
  padding:8px 14px;background:var(--surface);border-radius:12px;border:1.5px solid var(--border);}
.li{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;color:var(--muted);}
.ld{width:9px;height:9px;border-radius:50%;}
.sep{width:1px;height:14px;background:var(--border);margin:0 4px;}
.hol-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:8px;
  padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;}
.hol-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── WEEK TABLE ── */
.wtable-wrap{background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden;overflow-x:auto;}
table.wt{width:100%;border-collapse:collapse;table-layout:fixed;min-width:600px;}
table.wt th,table.wt td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
table.wt th:last-child,table.wt td:last-child{border-right:none;}
/* header row */
.wt-corner{width:66px;min-width:66px;background:#fdf5f8;border-bottom:2px solid var(--border)!important;border-right:2px solid var(--border)!important;}
.wt-dhead{padding:7px 4px;text-align:center;cursor:pointer;border-bottom:2px solid var(--border)!important;transition:background .15s;}
.wt-dhead:hover{background:var(--primary-light)!important;}
.wt-dn{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;color:var(--muted);}
.wt-dd{font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;color:var(--text);line-height:1;}
.wt-dhead.today .wt-dd{color:var(--primary);}
.wt-dhead.today{background:linear-gradient(135deg,#fff0f6,#ffd6e8)!important;}
.wt-hol{font-size:.52rem;color:#ff6b6b;font-weight:700;margin-top:1px;}
/* allday row */
.wt-adlabel{background:#fdf5f8;font-size:.55rem;font-weight:700;color:var(--muted);
  text-align:center;padding:3px 2px;border-right:2px solid var(--border)!important;
  border-bottom:2px solid var(--border)!important;vertical-align:middle;}
.wt-adcell{padding:2px 3px;vertical-align:top;cursor:pointer;border-bottom:2px solid var(--border)!important;transition:background .12s;}
.wt-adcell:hover{background:var(--primary-light);}
.ad-chip{font-size:.6rem;border-radius:4px;padding:1px 5px;color:#fff;font-weight:700;
  margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block;}
/* period rows */
.wt-plabel{background:#fdf5f8;vertical-align:top;padding:5px 6px 4px 4px;text-align:right;
  border-right:2px solid var(--border)!important;white-space:nowrap;}
.wt-pl-name{font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:800;color:var(--primary);}
.wt-pl-time{font-family:'Nunito',sans-serif;font-size:.52rem;color:var(--muted);}
.wt-pcell{height:60px;vertical-align:top;padding:0;position:relative;cursor:pointer;transition:background .12s;}
.wt-pcell:hover{background:rgba(255,126,179,.08);}
.wt-pcell.weekend{background:rgba(0,0,0,.025);cursor:default;}
.wt-pcell.weekend:hover{background:rgba(255,126,179,.08);}
.course-bg{position:absolute;inset:2px;border-radius:6px;display:flex;
  align-items:center;justify-content:center;font-size:.63rem;font-weight:800;
  text-align:center;line-height:1.3;pointer-events:none;}
.ev-block{position:absolute;inset:2px;border-radius:6px;padding:3px 6px;color:#fff;
  font-size:.62rem;font-weight:700;cursor:pointer;z-index:3;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.18);}
.ev-block:hover{filter:brightness(.88);}
.ev-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:.54rem;opacity:.85;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,44,53,.38);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;
  width:100%;max-width:400px;border:2px solid var(--border);
  box-shadow:0 20px 60px rgba(61,44,53,.22);animation:pop .22s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;color:var(--primary);margin-bottom:12px;}
.modal label{display:block;font-size:.73rem;font-weight:700;color:var(--muted);
  margin-top:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.modal input[type=text],.modal input[type=time]{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:.88rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);
  background:#fafafa;outline:none;transition:border-color .2s;}
.modal input:focus{border-color:var(--primary);background:#fff;}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:4px;}
.cat-btn{border:2px solid transparent;border-radius:8px;padding:5px 2px;
  font-size:.66rem;font-weight:700;cursor:pointer;color:#fff;text-align:center;transition:all .2s;}
.cat-btn.sel{border-color:#3d2c35;transform:scale(1.08);}
.mactions{display:flex;gap:7px;margin-top:16px;}
.bsave{flex:1;background:linear-gradient(135deg,var(--primary),#ff9dd0);color:#fff;
  border:none;border-radius:10px;padding:10px;font-size:.88rem;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;}
.bsave:hover{opacity:.9;}.bsave:disabled{opacity:.5;cursor:not-allowed;}
.bcancel{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:.83rem;font-weight:700;cursor:pointer;}
.bdel{background:#fff0f4;color:#ff4d6d;border:1.5px solid #ffb3c6;
  border-radius:10px;padding:10px 13px;font-size:.83rem;font-weight:700;cursor:pointer;}
.bdel:hover{background:#ff4d6d;color:#fff;}

/* holiday modal */
.hol-overlay{display:none;position:fixed;inset:0;background:rgba(61,44,53,.38);
  backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:16px;}
.hol-overlay.open{display:flex;}
.hrpt{flex:1;padding:8px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.83rem;transition:all .2s;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:3px;}
</style>
</head>
<body>
<div id="bar"></div>
<div class="app">

<div class="hd">
  <h1>🐠 魚兒の行事曆</h1>
  <div class="sync"><div class="sdot spin" id="sdot"></div><span id="stxt">連線中…</span></div>
</div>

<div class="nav">
  <div class="nav-l">
    <button class="nb" id="prevBtn">‹</button>
    <button class="nb" id="nextBtn">›</button>
    <span class="nav-title" id="navTitle"></span>
    <button class="tb" id="todayBtn">今天</button>
  </div>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>個人</div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>工作</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>學校</div>
  <div class="li"><div class="ld" style="background:#6ee7b7"></div>健康</div>
  <div class="li"><div class="ld" style="background:#fbbf24"></div>其他</div>
  <div class="li"><div class="ld" style="background:#ff6b6b"></div>節日</div>
  <div class="sep"></div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>高一英</div>
  <div class="li"><div class="ld" style="background:#4fc3f7"></div>高二123英</div>
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>高二2+3國</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>間接服務</div>
  <button class="hol-btn" onclick="openHolModal()">＋ 自訂節日</button>
</div>

<div class="wtable-wrap">
  <table class="wt" id="wt"></table>
</div>

</div><!-- /app -->

<!-- Event Modal -->
<div class="overlay" id="evOv">
  <div class="modal">
    <h2 id="evTitle2">🌸 新增事件</h2>
    <div id="evDateLbl" style="font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:2px;"></div>
    <label>事件名稱</label>
    <input type="text" id="evName" placeholder="輸入事件名稱…" maxlength="40">
    <label>開始時間（留空=全天）</label>
    <input type="time" id="evS">
    <label>結束時間</label>
    <input type="time" id="evE">
    <label>類別</label>
    <div class="cat-grid">
      <button class="cat-btn sel" style="background:#ff7eb3" data-cat="personal">個人</button>
      <button class="cat-btn" style="background:#7eb8ff" data-cat="work">工作</button>
      <button class="cat-btn" style="background:#a78bfa" data-cat="school">學校</button>
      <button class="cat-btn" style="background:#6ee7b7" data-cat="health">健康</button>
      <button class="cat-btn" style="background:#fbbf24" data-cat="other">其他</button>
    </div>
    <div class="mactions">
      <button class="bcancel" id="evCancelBtn">取消</button>
      <button class="bdel" id="evDelBtn" style="display:none">刪除</button>
      <button class="bsave" id="evSaveBtn">💾 儲存</button>
    </div>
  </div>
</div>

<!-- Holiday Modal -->
<div class="hol-overlay" id="holOv">
  <div class="modal">
    <h2>🎉 自訂節日</h2>
    <label>節日名稱</label>
    <input type="text" id="holName" placeholder="例：媽媽生日" maxlength="20">
    <label>日期（YYYY-MM-DD）</label>
    <input type="text" id="holDate" placeholder="2026-05-10">
    <label>重複方式</label>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="hrpt" id="hrptY" onclick="setHR(true)" style="border:2px solid var(--primary);background:var(--primary);color:#fff;">每年重複</button>
      <button class="hrpt" id="hrptN" onclick="setHR(false)" style="border:2px solid var(--border);background:#fafafa;color:var(--muted);">僅這年</button>
    </div>
    <div class="mactions">
      <button class="bcancel" onclick="closeHolModal()">取消</button>
      <button class="bsave" onclick="saveHol()">新增</button>
    </div>
    <div id="holList" style="margin-top:12px;"></div>
  </div>
</div>

<script>
// ── CONFIG ──
const API='https://script.google.com/macros/s/AKfycbx5aF0H4G0GnxCXEetAC8wUsVRUTUGSEJjCvfu4CzG952MEJq8pdQteXKCZMS0fEie0kw/exec';
const SCHED_START='2026-02-23', SCHED_END='2026-06-30';

const CAT={
  personal:{label:'個人',color:'#ff7eb3'},
  work:    {label:'工作',color:'#7eb8ff'},
  school:  {label:'學校',color:'#a78bfa'},
  health:  {label:'健康',color:'#6ee7b7'},
  other:   {label:'其他',color:'#fbbf24'},
};

const MONTH_BG=[
  '#fff0f6','#fff4e6','#f0fff4','#f0f9ff','#fdf4ff','#fff9e6',
  '#fff3e0','#e8f5e9','#e3f2fd','#fbe9e7','#f3e5f5','#e0f7fa'
];

// Periods: label, start, end
const PERIODS=[
  {n:'第1節',s:'08:00',e:'08:50'},
  {n:'第2節',s:'09:00',e:'09:50'},
  {n:'第3節',s:'10:00',e:'10:50'},
  {n:'第4節',s:'11:00',e:'11:50'},
  {n:'午休',  s:'11:50',e:'12:55'},
  {n:'第5節',s:'12:55',e:'13:45'},
  {n:'第6節',s:'13:55',e:'14:45'},
  {n:'第7節',s:'15:00',e:'15:50'},
  {n:'第8節',s:'16:00',e:'16:50'},
  {n:'課後',  s:'16:50',e:'18:00'},
];

// Timetable: wd=1-5, pi=period index
const SUBJ_COLOR={'高一2345英文':'#7eb8ff','高二123英文':'#4fc3f7','高二2+3國文':'#ff7eb3','間接服務':'#a78bfa'};
const TT={
  1:{2:'高一2345英文',3:'高二2+3國文',6:'高二123英文'},
  2:{0:'高一2345英文',1:'高二2+3國文',3:'高二123英文',4:'間接服務',5:'間接服務',6:'間接服務'},
  3:{0:'高二123英文', 2:'高一2345英文'},
  4:{1:'高二2+3國文', 2:'高一2345英文'},
  5:{0:'高二2+3國文', 5:'高二123英文', 6:'間接服務'},
};

// Holidays
const FH={'01-01':'元旦','02-28':'和平紀念日','04-04':'兒童節','04-05':'清明節','10-10':'國慶日','12-25':'聖誕節'};
const SH={
  '2026-02-17':'春節','2026-02-18':'春節','2026-02-19':'春節','2026-02-20':'春節',
  '2026-02-21':'春節','2026-02-22':'春節','2026-03-03':'元宵節',
  '2026-06-19':'端午節','2026-09-25':'中秋節','2026-12-22':'冬至',
  '2025-01-29':'春節','2025-05-31':'端午節','2025-10-06':'中秋節',
};
let customHols=JSON.parse(localStorage.getItem('yh')||'[]');

function getHols(ds){
  const r=[];
  if(FH[ds.slice(5)]) r.push(FH[ds.slice(5)]);
  if(SH[ds]) r.push(SH[ds]);
  customHols.forEach(h=>{
    if(h.r&&h.d.slice(5)===ds.slice(5)) r.push(h.n);
    else if(!h.r&&h.d===ds) r.push(h.n);
  });
  return [...new Set(r)];
}

// ── STATE ──
const $=id=>document.getElementById(id);
let events={}, cur=new Date(), selCat='personal', editing=null, pendingDk='';

function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayKey(){return dkey(cur);}
function fmtDk(ds){const[y,m,d]=ds.split('-');return `${y}年${+m}月${+d}日`;}

// Monday-start week
function weekMon(d){
  const r=new Date(d); r.setHours(0,0,0,0);
  const wd=r.getDay(); // 0=Sun
  r.setDate(r.getDate()-(wd===0?6:wd-1));
  return r;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

let wkStart=weekMon(cur);

// ── SYNC ──
function setSyncing(st,tx){$('sdot').className='sdot '+st;$('stxt').textContent=tx;}
function setLoad(on){$('bar').classList.toggle('on',on);}

async function fetchEvents(){
  setSyncing('spin','同步中…');setLoad(true);
  try{
    const res=await fetch(API+'?t='+Date.now());
    const rows=await res.json();
    events={};
    rows.forEach(r=>{
      if(!r.date)return;
      const ds=String(r.date).trim();
      if(!ds.match(/^\d{4}-\d{2}-\d{2}$/))return;
      if(!events[ds])events[ds]=[];
      events[ds].push({
        title:String(r.title||''),
        cat:r.cat||'other',
        ts:String(r.timeStart||'').trim().slice(0,5),
        te:String(r.timeEnd||'').trim().slice(0,5),
      });
    });
    Object.keys(events).forEach(k=>events[k].sort((a,b)=>(a.ts||'99:99').localeCompare(b.ts||'99:99')));
    setSyncing('ok','已同步');
  }catch{setSyncing('err','連線失敗');}
  setLoad(false);
  renderWeek();
}

async function apiPost(p){
  await fetch(API,{method:'POST',body:JSON.stringify(p)});
}

// ── RENDER ──
const WD=['日','一','二','三','四','五','六'];

function renderWeek(){
  const days=[];
  for(let i=0;i<7;i++) days.push(addDays(wkStart,i)); // Mon..Sun

  const s=days[0],e=days[6];
  $('navTitle').textContent=`${s.getFullYear()} 年 ${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`;

  const mbg=MONTH_BG[wkStart.getMonth()];
  const tbl=$('wt');
  tbl.innerHTML='';

  // ── thead: day headers ──
  const thead=tbl.createTHead();
  const hr=thead.insertRow();

  // corner
  const corner=document.createElement('th');
  corner.className='wt-corner';
  hr.appendChild(corner);

  days.forEach((d,i)=>{
    const dk=dkey(d);
    const wd=d.getDay();
    const isToday=dk===todayKey();
    const isWknd=(wd===0||wd===6);
    const hols=getHols(dk);
    const th=document.createElement('th');
    th.className='wt-dhead'+(isToday?' today':'');
    const dnC=wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#9e8a93';
    const ddC=isToday?'var(--primary)':wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#3d2c35';
    th.style.background=isToday?'linear-gradient(135deg,#fff0f6,#ffd6e8)':isWknd?'rgba(0,0,0,.03)':mbg;
    th.innerHTML=`<div class="wt-dn" style="color:${dnC}">${WD[wd]}</div>`
      +`<div class="wt-dd" style="color:${ddC}">${d.getDate()}</div>`
      +(hols.length?`<div class="wt-hol">${hols[0]}</div>`:'');
    th.onclick=()=>openEv(dk,'','');
    hr.appendChild(th);
  });

  // ── tbody ──
  const tbody=tbl.createTBody();

  // all-day row
  const adr=tbody.insertRow();
  const adlbl=document.createElement('td');
  adlbl.className='wt-adlabel';adlbl.textContent='全天';
  adr.appendChild(adlbl);
  days.forEach(d=>{
    const dk=dkey(d);
    const td=adr.insertCell();
    td.className='wt-adcell';
    td.onclick=()=>openEv(dk,'','');
    (events[dk]||[]).filter(ev=>!ev.ts).forEach((ev,idx)=>{
      const chip=document.createElement('div');
      chip.className='ad-chip';
      chip.style.background=CAT[ev.cat]?.color||'#aaa';
      chip.textContent=ev.title;
      chip.onclick=e=>{e.stopPropagation();openEv(dk,'','',idx);};
      td.appendChild(chip);
    });
  });

  // period rows
  PERIODS.forEach((p,pi)=>{
    const row=tbody.insertRow();

    // label
    const lbl=document.createElement('td');
    lbl.className='wt-plabel';
    lbl.innerHTML=`<div class="wt-pl-name">${p.n}</div><div class="wt-pl-time">${p.s}</div>`;
    row.appendChild(lbl);

    days.forEach((d,ci)=>{
      const dk=dkey(d);
      const wd=d.getDay();
      const isWknd=(wd===0||wd===6);
      const inSched=dk>=SCHED_START&&dk<=SCHED_END;
      const subj=(!isWknd&&inSched&&TT[wd])?TT[wd][pi]:null;

      const td=row.insertCell();
      td.className='wt-pcell'+(isWknd?' weekend':'');
      td.style.background=isWknd?'rgba(0,0,0,.025)':MONTH_BG[d.getMonth()];

      // course block
      if(subj){
        const color=SUBJ_COLOR[subj]||'#aaa';
        td.style.background=`linear-gradient(135deg,${color}28,${color}14)`;
        const cblk=document.createElement('div');
        cblk.className='course-bg';
        cblk.style.cssText=`color:${color};font-weight:800;font-size:.63rem;`;
        cblk.textContent=subj;
        td.appendChild(cblk);
      }

      td.onclick=e=>{
        if(e.target===td||e.target.classList.contains('course-bg'))
          openEv(dk,p.s,p.e);
      };

      // user events
      (events[dk]||[]).filter(ev=>ev.ts).forEach((ev,idx)=>{
        // match to this period (within 30 min of period start)
        const [ph,pm]=p.s.split(':').map(Number);
        const [eh,em]=ev.ts.split(':').map(Number);
        if(Math.abs((eh*60+em)-(ph*60+pm))>30) return;
        const eb=document.createElement('div');
        eb.className='ev-block';
        eb.style.background=CAT[ev.cat]?.color||'#aaa';
        eb.innerHTML=`<div class="ev-title">${ev.title}</div>`
          +`<div class="ev-time">${ev.ts}${ev.te?'–'+ev.te:''}</div>`;
        eb.onclick=e=>{e.stopPropagation();openEv(dk,'','',idx);};
        td.appendChild(eb);
      });
    });
  });
}

// ── NAV ──
$('prevBtn').onclick=()=>{wkStart=addDays(wkStart,-7);renderWeek();};
$('nextBtn').onclick=()=>{wkStart=addDays(wkStart,7);renderWeek();};
$('todayBtn').onclick=()=>{wkStart=weekMon(cur);renderWeek();};

// ── EVENT MODAL ──
function openEv(dk,defS,defE,idx=null){
  pendingDk=dk;
  editing=idx!==null?{dk,idx}:null;
  const isEdit=editing!==null;
  $('evTitle2').textContent=isEdit?'✏️ 編輯事件':'🌸 新增事件';
  $('evDateLbl').textContent='📅 '+fmtDk(dk);
  $('evDelBtn').style.display=isEdit?'block':'none';
  if(isEdit){
    const ev=events[dk][idx];
    $('evName').value=ev.title;
    $('evS').value=ev.ts||'';
    $('evE').value=ev.te||'';
    selCat=ev.cat||'personal';
  } else {
    $('evName').value='';
    $('evS').value=defS;
    $('evE').value=defE;
    selCat='personal';
  }
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('sel',b.dataset.cat===selCat));
  $('evOv').classList.add('open');
  setTimeout(()=>$('evName').focus(),80);
}

document.querySelectorAll('.cat-btn').forEach(b=>b.onclick=()=>{
  selCat=b.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel');
});

$('evSaveBtn').onclick=async()=>{
  const title=$('evName').value.trim();
  if(!title){$('evName').focus();return;}
  $('evSaveBtn').disabled=true;$('evSaveBtn').textContent='儲存中…';
  $('evOv').classList.remove('open');
  setSyncing('spin','儲存中…');setLoad(true);
  if(editing){
    const old=events[editing.dk][editing.idx];
    await apiPost({action:'delete',date:editing.dk,title:old.title,cat:old.cat});
    await apiPost({action:'add',date:editing.dk,title,cat:selCat,timeStart:$('evS').value,timeEnd:$('evE').value});
  } else {
    await apiPost({action:'add',date:pendingDk,title,cat:selCat,timeStart:$('evS').value,timeEnd:$('evE').value});
  }
  await fetchEvents();
  $('evSaveBtn').disabled=false;$('evSaveBtn').textContent='💾 儲存';
};

$('evDelBtn').onclick=async()=>{
  if(!editing||!confirm('確定刪除？'))return;
  $('evOv').classList.remove('open');
  setSyncing('spin','刪除中…');setLoad(true);
  const ev=events[editing.dk][editing.idx];
  await apiPost({action:'delete',date:editing.dk,title:ev.title,cat:ev.cat});
  await fetchEvents();
};

$('evCancelBtn').onclick=()=>$('evOv').classList.remove('open');
$('evOv').onclick=e=>{if(e.target===$('evOv'))$('evOv').classList.remove('open');};
$('evName').onkeydown=e=>{if(e.key==='Enter')$('evSaveBtn').click();if(e.key==='Escape')$('evCancelBtn').click();};

// ── HOLIDAY MODAL ──
let holRepeat=true;
function openHolModal(){renderHolList();$('holOv').classList.add('open');}
function closeHolModal(){$('holOv').classList.remove('open');}
$('holOv').onclick=e=>{if(e.target===$('holOv'))closeHolModal();};
function setHR(v){
  holRepeat=v;
  $('hrptY').style.cssText=`border:2px solid ${v?'var(--primary)':'var(--border)'};background:${v?'var(--primary)':'#fafafa'};color:${v?'#fff':'var(--muted)'};`;
  $('hrptN').style.cssText=`border:2px solid ${!v?'var(--primary)':'var(--border)'};background:${!v?'var(--primary)':'#fafafa'};color:${!v?'#fff':'var(--muted)'};`;
}
function saveHol(){
  const n=$('holName').value.trim(),d=$('holDate').value.trim();
  if(!n||!d.match(/^\d{4}-\d{2}-\d{2}$/)){alert('請填寫名稱和日期（YYYY-MM-DD）');return;}
  customHols.push({n,d,r:holRepeat});
  localStorage.setItem('yh',JSON.stringify(customHols));
  $('holName').value='';$('holDate').value='';
  renderHolList();renderWeek();
}
function renderHolList(){
  const el=$('holList');
  if(!customHols.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:6px;">已新增</div>';
  customHols.forEach((h,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.78rem;';
    row.innerHTML=`<span style="flex:1;font-weight:600;">${h.n}</span><span style="color:var(--muted);">${h.d}${h.r?' (每年)':''}</span>`;
    const db=document.createElement('button');
    db.textContent='✕';db.style.cssText='background:none;border:none;color:#ffb3c6;cursor:pointer;font-size:.88rem;padding:2px 5px;border-radius:4px;';
    db.onclick=()=>{customHols.splice(i,1);localStorage.setItem('yh',JSON.stringify(customHols));renderHolList();renderWeek();};
    row.appendChild(db);el.appendChild(row);
  });
}

// ── INIT ──
renderWeek();
fetchEvents();
</script>
