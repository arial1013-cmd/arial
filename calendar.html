<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚兒の行事曆 🐠</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--p:#ff7eb3;--pl:#ffd6e8;--bg:#fff8f5;--sur:#fff;--text:#3d2c35;--mu:#9e8a93;--bd:#f0dce6;--r:16px;}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:1080px;margin:0 auto;padding:14px 10px;}
#bar{position:fixed;top:0;left:0;right:0;height:3px;display:none;z-index:999;
  background:linear-gradient(90deg,var(--p),#7ec8e3,var(--p));background-size:200%;animation:sl 1.2s linear infinite;}
#bar.on{display:block;}@keyframes sl{to{background-position:200%}}
.hd{text-align:center;margin-bottom:12px;}
.hd h1{font-family:"Nunito",sans-serif;font-size:1.7rem;font-weight:900;color:var(--p);}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;
  color:var(--mu);padding:3px 10px;border-radius:20px;background:var(--sur);
  border:1px solid var(--bd);margin-top:4px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.sdot.ok{background:#6ee7b7;}.sdot.spin{background:#fbbf24;animation:pu .8s ease infinite alternate;}.sdot.err{background:#ff6b6b;}
@keyframes pu{from{opacity:1}to{opacity:.3}}
.nav{display:flex;align-items:center;justify-content:space-between;background:var(--sur);
  border-radius:var(--r);padding:9px 14px;margin-bottom:10px;
  box-shadow:0 4px 16px rgba(255,126,179,.12);border:1.5px solid var(--bd);}
.nav-l{display:flex;align-items:center;gap:7px;}
.ntitle{font-family:"Nunito",sans-serif;font-size:1rem;font-weight:900;}
.nb{background:var(--pl);border:none;color:var(--p);width:30px;height:30px;border-radius:50%;
  font-size:.95rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nb:hover{background:var(--p);color:#fff;}
.tb{background:var(--p);color:#fff;border:none;border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700;cursor:pointer;}
.legend{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px;
  padding:7px 12px;background:var(--sur);border-radius:12px;border:1.5px solid var(--bd);}
.li{display:flex;align-items:center;gap:3px;font-size:.68rem;font-weight:600;color:var(--mu);}
.ld{width:8px;height:8px;border-radius:50%;}
.sep{width:1px;height:12px;background:var(--bd);margin:0 3px;}
.hbtn{margin-left:auto;background:none;border:1px solid var(--bd);border-radius:7px;
  padding:2px 9px;font-size:.68rem;font-weight:700;color:var(--mu);cursor:pointer;}
.hbtn:hover{border-color:var(--p);color:var(--p);}
.twrap{background:var(--sur);border-radius:var(--r);overflow:hidden;overflow-x:auto;
  box-shadow:0 4px 16px rgba(255,126,179,.12);border:1.5px solid var(--bd);}
table.wt{width:100%;border-collapse:collapse;table-layout:fixed;min-width:560px;}
table.wt th,table.wt td{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);}
table.wt th:last-child,table.wt td:last-child{border-right:none;}
.wcorner{width:58px;min-width:58px;background:#fdf5f8;border-bottom:2px solid var(--bd)!important;border-right:2px solid var(--bd)!important;}
.wdhead{padding:6px 3px;text-align:center;cursor:pointer;border-bottom:2px solid var(--bd)!important;transition:background .15s;}
.wdhead:hover{filter:brightness(.96);}
.wdn{font-family:"Nunito",sans-serif;font-size:.65rem;font-weight:800;}
.wdd{font-family:"Nunito",sans-serif;font-size:1.15rem;font-weight:900;line-height:1;}
.whol{font-size:.5rem;color:#ff6b6b;font-weight:700;margin-top:1px;}
.wadlbl{background:#fdf5f8;font-size:.52rem;font-weight:700;color:var(--mu);text-align:center;
  padding:2px;vertical-align:middle;border-right:2px solid var(--bd)!important;border-bottom:2px solid var(--bd)!important;}
.wadcell{padding:2px 3px;vertical-align:top;cursor:pointer;border-bottom:2px solid var(--bd)!important;transition:background .12s;}
.wadcell:hover{background:var(--pl);}
.wadchip{display:block;font-size:.58rem;border-radius:3px;padding:1px 5px;color:#fff;font-weight:700;
  margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.wplbl{background:#fdf5f8;vertical-align:top;padding:4px 5px 3px 3px;text-align:right;
  border-right:2px solid var(--bd)!important;white-space:nowrap;}
.wpn{font-family:"Nunito",sans-serif;font-size:.6rem;font-weight:800;color:var(--p);}
.wpt{font-family:"Nunito",sans-serif;font-size:.5rem;color:var(--mu);}
.wpcell{height:58px;vertical-align:top;padding:0;position:relative;cursor:pointer;transition:background .12s;}
.wpcell:hover{background:rgba(255,126,179,.08);}
.wpcell.wknd{background:rgba(0,0,0,.025);}
.wcbg{position:absolute;inset:2px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:.6rem;font-weight:800;text-align:center;line-height:1.3;pointer-events:none;}
.wevb{position:absolute;inset:2px;border-radius:5px;padding:2px 5px;color:#fff;font-size:.6rem;
  font-weight:700;cursor:pointer;z-index:3;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.15);}
.wevb:hover{filter:brightness(.88);}
.ov{display:none;position:fixed;inset:0;background:rgba(61,44,53,.4);backdrop-filter:blur(4px);
  z-index:500;align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
.modal{background:var(--sur);border-radius:var(--r);padding:22px;width:100%;max-width:380px;
  border:2px solid var(--bd);box-shadow:0 16px 48px rgba(61,44,53,.2);animation:pop .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-family:"Nunito",sans-serif;font-size:1rem;font-weight:900;color:var(--p);margin-bottom:10px;}
.modal label{display:block;font-size:.7rem;font-weight:700;color:var(--mu);margin-top:9px;margin-bottom:3px;text-transform:uppercase;}
.modal input[type=text],.modal input[type=time]{width:100%;padding:8px 11px;border:1.5px solid var(--bd);
  border-radius:9px;font-size:.85rem;font-family:"Noto Sans TC",sans-serif;color:var(--text);background:#fafafa;outline:none;}
.modal input:focus{border-color:var(--p);}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:3px;}
.cbtn{border:2px solid transparent;border-radius:7px;padding:4px 2px;font-size:.63rem;
  font-weight:700;cursor:pointer;color:#fff;text-align:center;transition:all .2s;}
.cbtn.sel{border-color:#3d2c35;transform:scale(1.08);}
.mact{display:flex;gap:6px;margin-top:14px;}
.bsave{flex:1;background:linear-gradient(135deg,var(--p),#ff9dd0);color:#fff;border:none;
  border-radius:9px;padding:9px;font-size:.85rem;font-weight:800;font-family:"Nunito",sans-serif;cursor:pointer;}
.bsave:disabled{opacity:.5;cursor:not-allowed;}
.bcancel{background:var(--bg);color:var(--mu);border:1.5px solid var(--bd);border-radius:9px;padding:9px 13px;font-size:.8rem;font-weight:700;cursor:pointer;}
.bdel{background:#fff0f4;color:#ff4d6d;border:1.5px solid #ffb3c6;border-radius:9px;padding:9px 12px;font-size:.8rem;font-weight:700;cursor:pointer;}
.bdel:hover{background:#ff4d6d;color:#fff;}
.hov{display:none;position:fixed;inset:0;background:rgba(61,44,53,.4);backdrop-filter:blur(4px);
  z-index:600;align-items:center;justify-content:center;padding:16px;}
.hov.open{display:flex;}
.hrb{flex:1;padding:7px;border-radius:9px;font-weight:700;cursor:pointer;font-size:.8rem;transition:all .2s;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--pl);border-radius:3px;}
</style>
</head>
<body>
<div id="bar"></div>
<div class="app">
<div class="hd">
  <h1>🐠 魚兒の行事曆</h1>
  <div class="sync"><div class="sdot spin" id="sdot"></div><span id="stxt">連線中…</span></div>
</div>
<div class="nav">
  <div class="nav-l">
    <button class="nb" id="prevBtn">‹</button>
    <button class="nb" id="nextBtn">›</button>
    <span class="ntitle" id="navTitle"></span>
    <button class="tb" id="todayBtn">今天</button>
  </div>
</div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>個人</div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>工作</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>學校</div>
  <div class="li"><div class="ld" style="background:#6ee7b7"></div>健康</div>
  <div class="li"><div class="ld" style="background:#fbbf24"></div>其他</div>
  <div class="li"><div class="ld" style="background:#ff6b6b"></div>節日</div>
  <div class="sep"></div>
  <div class="li"><div class="ld" style="background:#7eb8ff"></div>高一英</div>
  <div class="li"><div class="ld" style="background:#4fc3f7"></div>高二123英</div>
  <div class="li"><div class="ld" style="background:#ff7eb3"></div>高二2+3國</div>
  <div class="li"><div class="ld" style="background:#a78bfa"></div>間接服務</div>
  <button class="hbtn" onclick="openHol()">＋ 自訂節日</button>
</div>
<div class="twrap"><table class="wt" id="wt"></table></div>
</div>
<!-- Event Modal -->
<div class="ov" id="evOv">
  <div class="modal">
    <h2 id="evH">🌸 新增事件</h2>
    <div id="evDlbl" style="font-size:.72rem;color:var(--mu);font-weight:600;margin-bottom:2px;"></div>
    <label>事件名稱</label>
    <input type="text" id="evN" placeholder="輸入事件名稱…" maxlength="40">
    <label>開始時間（留空=全天）</label>
    <input type="time" id="evS">
    <label>結束時間</label>
    <input type="time" id="evE">
    <label>類別</label>
    <div class="cgrid">
      <button class="cbtn sel" style="background:#ff7eb3" data-cat="personal">個人</button>
      <button class="cbtn" style="background:#7eb8ff" data-cat="work">工作</button>
      <button class="cbtn" style="background:#a78bfa" data-cat="school">學校</button>
      <button class="cbtn" style="background:#6ee7b7" data-cat="health">健康</button>
      <button class="cbtn" style="background:#fbbf24" data-cat="other">其他</button>
    </div>
    <div class="mact">
      <button class="bcancel" id="evCan">取消</button>
      <button class="bdel" id="evDel" style="display:none">刪除</button>
      <button class="bsave" id="evSav">💾 儲存</button>
    </div>
  </div>
</div>
<!-- Holiday Modal -->
<div class="hov" id="holOv">
  <div class="modal">
    <h2>🎉 自訂節日</h2>
    <label>節日名稱</label>
    <input type="text" id="holN" placeholder="例：媽媽生日" maxlength="20">
    <label>日期（YYYY-MM-DD）</label>
    <input type="text" id="holD" placeholder="2026-05-10">
    <label>重複方式</label>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="hrb" id="hrY" onclick="setHR(true)" style="border:2px solid var(--p);background:var(--p);color:#fff;">每年重複</button>
      <button class="hrb" id="hrN" onclick="setHR(false)" style="border:2px solid var(--bd);background:#fafafa;color:var(--mu);">僅這年</button>
    </div>
    <div class="mact">
      <button class="bcancel" onclick="closeHol()">取消</button>
      <button class="bsave" onclick="saveHol()">新增</button>
    </div>
    <div id="holList" style="margin-top:10px;"></div>
  </div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbx5aF0H4G0GnxCXEetAC8wUsVRUTUGSEJjCvfu4CzG952MEJq8pdQteXKCZMS0fEie0kw/exec';
const CAT={personal:{label:'個人',color:'#ff7eb3'},work:{label:'工作',color:'#7eb8ff'},school:{label:'學校',color:'#a78bfa'},health:{label:'健康',color:'#6ee7b7'},other:{label:'其他',color:'#fbbf24'}};
const MBG=['#fff0f6','#fff4e6','#f0fff4','#f0f9ff','#fdf4ff','#fff9e6','#fff3e0','#e8f5e9','#e3f2fd','#fbe9e7','#f3e5f5','#e0f7fa'];
const WD=['日','一','二','三','四','五','六'];
const PERIODS=[
  {n:'第1節',s:'08:00',e:'08:50'},
  {n:'第2節',s:'09:00',e:'09:50'},
  {n:'第3節',s:'10:00',e:'10:50'},
  {n:'第4節',s:'11:00',e:'11:50'},
  {n:'午休',  s:'11:50',e:'12:55'},
  {n:'第5節',s:'12:55',e:'13:45'},
  {n:'第6節',s:'13:55',e:'14:45'},
  {n:'第7節',s:'15:00',e:'15:50'},
  {n:'第8節',s:'16:00',e:'16:50'},
  {n:'備註',  s:'',    e:''},
];
const SC={'高一2345英文':'#7eb8ff','高二123英文':'#4fc3f7','高二2+3國文':'#ff7eb3','間接服務':'#a78bfa'};
const TT={
  1:{1:'間接服務',2:'高一2345英文',3:'高二2+3國文',7:'高二123英文'},
  2:{0:'高一2345英文',1:'高二2+3國文',3:'高二123英文',5:'間接服務',6:'間接服務',7:'間接服務'},
  3:{0:'高二123英文',2:'高一2345英文'},
  4:{1:'高二2+3國文',2:'高一2345英文'},
  5:{0:'高二2+3國文',6:'高二123英文',7:'間接服務'},
};
const SS='2026-02-23',SE='2026-06-30';
const FH={'01-01':'元旦','02-28':'和平紀念日','04-04':'兒童節','04-05':'清明節','10-10':'國慶日','12-25':'聖誕節'};
const SH={'2026-02-17':'春節','2026-02-18':'春節','2026-02-19':'春節','2026-02-20':'春節','2026-02-21':'春節','2026-02-22':'春節','2026-03-03':'元宵節','2026-06-19':'端午節','2026-09-25':'中秋節','2026-12-22':'冬至','2025-01-29':'春節','2025-05-31':'端午節','2025-10-06':'中秋節'};
let customHols=JSON.parse(localStorage.getItem('yh')||'[]');
function getHols(ds){const r=[];if(FH[ds.slice(5)])r.push(FH[ds.slice(5)]);if(SH[ds])r.push(SH[ds]);customHols.forEach(h=>{if(h.r&&h.d.slice(5)===ds.slice(5))r.push(h.n);else if(!h.r&&h.d===ds)r.push(h.n);});return[...new Set(r)];}
const $=id=>document.getElementById(id);
let events={},cur=new Date(),selCat='personal',editing=null,pendingDk='',holRepeat=true;
let wkStart=weekMon(cur);
function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayKey(){return dkey(cur);}
function fmtDk(ds){const[y,m,d]=ds.split('-');return `${y}年${+m}月${+d}日`;}
function weekMon(d){const r=new Date(d);r.setHours(0,0,0,0);const w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function setSyncing(st,tx){$('sdot').className='sdot '+st;$('stxt').textContent=tx;}
function setLoad(on){$('bar').classList.toggle('on',on);}

async function fetchEvents(){
  setSyncing('spin','同步中…');setLoad(true);
  try{
    const res=await fetch(API+'?t='+Date.now());
    const rows=await res.json();
    events={};
    rows.forEach(r=>{
      if(!r.date)return;
      const ds=String(r.date).trim();
      if(!ds.match(/^\d{4}-\d{2}-\d{2}$/))return;
      if(!events[ds])events[ds]=[];
      events[ds].push({title:String(r.title||''),cat:r.cat||'other',ts:String(r.timeStart||'').trim().slice(0,5),te:String(r.timeEnd||'').trim().slice(0,5)});
    });
    Object.keys(events).forEach(k=>events[k].sort((a,b)=>(a.ts||'99:99').localeCompare(b.ts||'99:99')));
    setSyncing('ok','已同步');
  }catch(e){setSyncing('err','連線失敗');}
  setLoad(false);
  renderWeek();
}
async function apiPost(p){await fetch(API,{method:'POST',body:JSON.stringify(p)});}

function getEvForPeriod(dk,pi,isNote){
  if(isNote)return(events[dk]||[]).filter(ev=>ev.ts==='23:59');
  const p=PERIODS[pi];if(!p.s)return[];
  return(events[dk]||[]).filter(ev=>{
    if(!ev.ts||ev.ts===''||ev.ts==='23:59')return false;
    const[ph,pm]=p.s.split(':').map(Number);
    const[eh,em]=ev.ts.split(':').map(Number);
    return Math.abs((eh*60+em)-(ph*60+pm))<=30;
  });
}

function renderWeek(){
  const days=[];for(let i=0;i<7;i++)days.push(addDays(wkStart,i));
  const s=days[0],e=days[6];
  $('navTitle').textContent=`${s.getFullYear()} 年 ${s.getMonth()+1}/${s.getDate()}–${e.getMonth()+1}/${e.getDate()}`;
  const mbg=MBG[wkStart.getMonth()];
  const tbl=$('wt');tbl.innerHTML='';
  const thead=tbl.createTHead();const hr=thead.insertRow();
  const co=document.createElement('th');co.className='wcorner';hr.appendChild(co);
  days.forEach((d,i)=>{
    const dk=dkey(d),wd=d.getDay(),isToday=dk===todayKey(),isW=(wd===0||wd===6),hols=getHols(dk);
    const dnC=wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#9e8a93';
    const ddC=isToday?'var(--p)':wd===0?'#ff6b6b':wd===6?'#7ec8e3':'#3d2c35';
    const th=document.createElement('th');th.className='wdhead';
    th.style.background=isToday?'linear-gradient(135deg,#fff0f6,#ffd6e8)':isW?'rgba(0,0,0,.03)':mbg;
    th.innerHTML=`<div class="wdn" style="color:${dnC}">${WD[wd]}</div><div class="wdd" style="color:${ddC}">${d.getDate()}</div>${hols.length?`<div class="whol">${hols[0]}</div>`:''}`;
    th.onclick=()=>openEv(dk,'','');hr.appendChild(th);
  });
  const tbody=tbl.createTBody();
  const adr=tbody.insertRow();
  const al=document.createElement('td');al.className='wadlbl';al.textContent='全天';adr.appendChild(al);
  days.forEach(d=>{
    const dk=dkey(d);const td=adr.insertCell();td.className='wadcell';
    td.onclick=()=>openEv(dk,'','');
    (events[dk]||[]).filter(ev=>!ev.ts||ev.ts==='').forEach(ev=>{
      const c=document.createElement('div');c.className='wadchip';
      c.style.background=CAT[ev.cat]?.color||'#aaa';c.textContent=ev.title;
      c.onclick=e=>{e.stopPropagation();openEv(dk,'','',events[dk].indexOf(ev));};td.appendChild(c);
    });
  });
  PERIODS.forEach((p,pi)=>{
    const isNote=p.n==='備註';const row=tbody.insertRow();
    const lbl=document.createElement('td');lbl.className='wplbl';
    lbl.innerHTML=`<div class="wpn">${p.n}</div>${p.s&&!isNote?`<div class="wpt">${p.s}</div>`:''}`;row.appendChild(lbl);
    days.forEach((d,ci)=>{
      const dk=dkey(d),wd=d.getDay(),isW=(wd===0||wd===6);
      const inS=dk>=SS&&dk<=SE;const subj=(!isW&&inS&&TT[wd])?TT[wd][pi]:null;
      const td=row.insertCell();td.className='wpcell'+(isW?' wknd':'');
      td.style.background=isW?'rgba(0,0,0,.025)':MBG[d.getMonth()];
      if(subj){const color=SC[subj]||'#aaa';td.style.background=`linear-gradient(135deg,${color}26,${color}12)`;const cb=document.createElement('div');cb.className='wcbg';cb.style.color=color;cb.textContent=subj;td.appendChild(cb);}
      td.onclick=e=>{if(e.target===td||e.target.classList.contains('wcbg'))openEv(dk,isNote?'23:59':p.s,isNote?'23:59':p.e);};
      getEvForPeriod(dk,pi,isNote).forEach(ev=>{
        const eb=document.createElement('div');eb.className='wevb';
        eb.style.background=CAT[ev.cat]?.color||'#aaa';
        eb.innerHTML=`<div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ev.title}</div>${ev.ts&&ev.ts!=='23:59'?`<div style="font-size:.53rem;opacity:.85;">${ev.ts}${ev.te?'–'+ev.te:''}</div>`:''}`;
        eb.onclick=e=>{e.stopPropagation();openEv(dk,'','',events[dk].indexOf(ev));};td.appendChild(eb);
      });
    });
  });
}

$('prevBtn').onclick=()=>{wkStart=addDays(wkStart,-7);renderWeek();};
$('nextBtn').onclick=()=>{wkStart=addDays(wkStart,7);renderWeek();};
$('todayBtn').onclick=()=>{wkStart=weekMon(cur);renderWeek();};

function openEv(dk,defS,defE,idx=null){
  pendingDk=dk;editing=idx!==null?{dk,idx}:null;
  const isEdit=editing!==null;
  $('evH').textContent=isEdit?'✏️ 編輯事件':'🌸 新增事件';
  $('evDlbl').textContent='📅 '+fmtDk(dk);
  $('evDel').style.display=isEdit?'block':'none';
  if(isEdit){const ev=events[dk][idx];$('evN').value=ev.title;$('evS').value=ev.ts==='23:59'?'23:59':ev.ts||'';$('evS').style.display=ev.ts==='23:59'?'none':'block';$('evE').value=ev.te==='23:59'?'23:59':ev.te||'';$('evE').style.display=ev.te==='23:59'?'none':'block';selCat=ev.cat||'personal';}
  else{$('evN').value='';$('evS').value=defS==='23:59'?'23:59':defS;$('evS').style.display=defS==='23:59'?'none':'block';$('evE').value=defE==='23:59'?'23:59':defE;$('evE').style.display=defE==='23:59'?'none':'block';selCat='personal';}
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.cat===selCat));
  $('evOv').classList.add('open');setTimeout(()=>$('evN').focus(),80);
}
document.querySelectorAll('.cbtn').forEach(b=>b.onclick=()=>{selCat=b.dataset.cat;document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});
$('evSav').onclick=async()=>{
  const title=$('evN').value.trim();if(!title){$('evN').focus();return;}
  $('evSav').disabled=true;$('evSav').textContent='儲存中…';$('evOv').classList.remove('open');
  setSyncing('spin','儲存中…');setLoad(true);
  const ts=$('evS').value||'',te=$('evE').value||'';
  if(editing){
    const old=events[editing.dk][editing.idx];
    await apiPost({action:'delete',date:editing.dk,title:old.title,cat:old.cat});
    await apiPost({action:'add',date:editing.dk,title,cat:selCat,timeStart:old.ts==='23:59'?'23:59':ts,timeEnd:old.ts==='23:59'?'23:59':te});
  }else{
    await apiPost({action:'add',date:pendingDk,title,cat:selCat,timeStart:ts,timeEnd:te});
  }
  await fetchEvents();$('evSav').disabled=false;$('evSav').textContent='💾 儲存';
};
$('evDel').onclick=async()=>{
  if(!editing||!confirm('確定刪除？'))return;
  $('evOv').classList.remove('open');setSyncing('spin','刪除中…');setLoad(true);
  const ev=events[editing.dk][editing.idx];
  await apiPost({action:'delete',date:editing.dk,title:ev.title,cat:ev.cat});
  await fetchEvents();
};
$('evCan').onclick=()=>$('evOv').classList.remove('open');
$('evOv').onclick=e=>{if(e.target===$('evOv'))$('evOv').classList.remove('open');};
$('evN').onkeydown=e=>{if(e.key==='Enter')$('evSav').click();if(e.key==='Escape')$('evCan').click();};

function openHol(){renderHolList();$('holOv').classList.add('open');}
function closeHol(){$('holOv').classList.remove('open');}
$('holOv').onclick=e=>{if(e.target===$('holOv'))closeHol();};
function setHR(v){holRepeat=v;
  $('hrY').style.cssText=`border:2px solid ${v?'var(--p)':'var(--bd)'};background:${v?'var(--p)':'#fafafa'};color:${v?'#fff':'var(--mu)'};`;
  $('hrN').style.cssText=`border:2px solid ${!v?'var(--p)':'var(--bd)'};background:${!v?'var(--p)':'#fafafa'};color:${!v?'#fff':'var(--mu)'};`;}
function saveHol(){
  const n=$('holN').value.trim(),d=$('holD').value.trim();
  if(!n||!d.match(/^\d{4}-\d{2}-\d{2}$/)){alert('請填寫名稱和日期（YYYY-MM-DD）');return;}
  customHols.push({n,d,r:holRepeat});localStorage.setItem('yh',JSON.stringify(customHols));
  $('holN').value='';$('holD').value='';renderHolList();renderWeek();
}
function renderHolList(){
  const el=$('holList');if(!customHols.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-size:.68rem;font-weight:700;color:var(--mu);margin-bottom:5px;">已新增</div>';
  customHols.forEach((h,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--bd);font-size:.75rem;';
    row.innerHTML=`<span style="flex:1;font-weight:600;">${h.n}</span><span style="color:var(--mu);">${h.d}${h.r?' (每年)':''}</span>`;
    const db=document.createElement('button');db.textContent='✕';
    db.style.cssText='background:none;border:none;color:#ffb3c6;cursor:pointer;font-size:.85rem;padding:2px 4px;';
    db.onclick=()=>{customHols.splice(i,1);localStorage.setItem('yh',JSON.stringify(customHols));renderHolList();renderWeek();};
    row.appendChild(db);el.appendChild(row);
  });
}

// Init
renderWeek();
fetchEvents();
</script>
</body>
</html>
